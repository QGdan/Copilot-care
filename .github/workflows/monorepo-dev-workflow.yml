name: Monorepo Dev Workflow

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'docs/process/**'
      - '.opencode/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'opencode.json'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'docs/process/**'
      - '.opencode/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'opencode.json'
  workflow_dispatch:

concurrency:
  group: monorepo-dev-workflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI verification workflow
        run: npm run ci:verify

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          path: reports/**
          if-no-files-found: ignore
